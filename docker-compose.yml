services:
  web:
    build: .
    container_name: k-ai-award-web
    ports:
      - "8400:8400"
    volumes:
      - ./welfare_data.json:/usr/share/nginx/html/welfare_data.json
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: k-ai-award-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
