services:
  web:
    build: .
    container_name: k-ai-award-web
    ports:
      - "8400:8400"
    volumes:
      - ./welfare_data.json:/usr/share/nginx/html/welfare_data.json
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: k-ai-award-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
